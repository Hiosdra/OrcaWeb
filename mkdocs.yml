site_name: OrcaWeb
docs_dir: mkdocs-docs
site_description: OrcaSlicer running in the browser via WebAssembly
site_url: https://hiosdra.github.io/OrcaWeb/docs/
repo_url: https://github.com/Hiosdra/OrcaWeb
repo_name: Hiosdra/OrcaWeb
edit_uri: edit/master/mkdocs-docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Status: status.md
  - Getting Started: getting-started.md
  - User Guide: user-guide.md
  - Architecture: architecture.md
  - API Reference: api-reference.md
  - Profiles: profiles.md
  - CLI: cli.md
  - Building WASM: wasm-build.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
  - md_in_html

plugins:
  - search
