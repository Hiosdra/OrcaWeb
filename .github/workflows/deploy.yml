name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node / Vite app ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build Vite app
        run: npm run build
        env:
          # App served at /OrcaWeb/app/
          VITE_BASE: /OrcaWeb/app/
          # WASM fetched from GitHub Releases at runtime (CORS: objects.githubusercontent.com)
          VITE_WASM_BASE_URL: https://github.com/allanwrench28/orcaslicer-wasm/releases/download/v1.1

      # ── Python / MkDocs ─────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material

      - name: Build MkDocs
        run: mkdocs build --config-file mkdocs.yml --site-dir dist-docs --strict

      # ── Assemble gh-pages tree ───────────────────────────────────────
      - name: Assemble output
        run: |
          mkdir -p gh-pages/app gh-pages/docs
          # Landing page at root
          cp landing/index.html gh-pages/index.html
          # Slicer app at /app/
          cp -r dist/. gh-pages/app/
          # MkDocs at /docs/
          cp -r dist-docs/. gh-pages/docs/
          # Prevent Jekyll processing
          touch gh-pages/.nojekyll

      # ── Deploy ───────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true
