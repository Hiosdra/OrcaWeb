name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node / Vite app ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # ── Download WASM artifacts ──────────────────────────────────────
      # We serve WASM from the same origin as the app (GitHub Pages) so
      # no CORS headers are needed.  slicer.data is 144 MB — above git's
      # 100 MB per-file limit — so it is split into two ≈72 MB chunks.
      # The worker transparently reassembles them via the fetch patch in
      # src/workers/slicer.worker.ts.
      - name: Download & split WASM artifacts
        run: |
          mkdir -p public/wasm
          BASE="https://github.com/allanwrench28/orcaslicer-wasm/releases/download/v1.1"
          curl -fL "$BASE/slicer.js"   -o public/wasm/slicer.js
          curl -fL "$BASE/slicer.wasm" -o public/wasm/slicer.wasm
          curl -fL "$BASE/slicer.data" -o public/wasm/slicer.data.full
          # Split into two chunks, each ≈72 MB (well under GitHub's 100 MB limit)
          split -b 75497472 public/wasm/slicer.data.full public/wasm/slicer.data.part
          mv public/wasm/slicer.data.partaa public/wasm/slicer.data.part0
          mv public/wasm/slicer.data.partab public/wasm/slicer.data.part1
          rm  public/wasm/slicer.data.full
          ls -lh public/wasm/

      # ── Build Vite app ───────────────────────────────────────────────
      - name: Build Vite app
        run: npm run build
        env:
          # App served at /OrcaWeb/app/ on GitHub Pages
          VITE_BASE: /OrcaWeb/app/
          # WASM served from same origin — no external URL needed.
          # worker-singleton.ts uses import.meta.env.BASE_URL + 'wasm'

      # ── Python / MkDocs ─────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material

      - name: Build MkDocs
        run: mkdocs build --config-file mkdocs.yml --site-dir dist-docs --strict

      # ── Assemble gh-pages tree ───────────────────────────────────────
      - name: Assemble output
        run: |
          mkdir -p gh-pages/app gh-pages/docs
          # Landing page at root
          cp landing/index.html gh-pages/index.html
          # Slicer app at /app/
          cp -r dist/. gh-pages/app/
          # MkDocs at /docs/
          cp -r dist-docs/. gh-pages/docs/
          # Prevent Jekyll processing
          touch gh-pages/.nojekyll

      # ── Deploy ───────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true
