name: Deploy

on:
  push:
    branches: [master]
    # Skip the immediate push-triggered deploy when a push touches *only* the
    # WASM build pipeline: build-wasm.yml's own master-push trigger (see that
    # file) is about to build and publish a fresh engine release for this
    # exact commit, and deploying right now would just re-ship the previous
    # release, then need a second deploy moments later anyway once
    # workflow_run (below) fires. A push that also touches anything outside
    # orca-wasm/ still deploys immediately as before.
    paths-ignore:
      - 'orca-wasm/**'
  # Chain off build-wasm.yml so a master push that changed the engine always
  # gets its matching deploy once the new release actually exists, instead of
  # racing it — see paths-ignore above and 395d3fe, which shipped a new
  # session-handle bridge API on master with no automated rebuild, so the
  # frontend ran ahead of a matching engine release ("Engine error" incident).
  workflow_run:
    workflows: ["Build WASM"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

# Serialize deploys: two concurrent pushes both publishing to gh-pages with
# force_orphan would race and could clobber each other. Let the latest win.
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    # workflow_run fires for every Build WASM run, including PR-validation
    # builds (which target PR branches, not master, and never publish) and
    # failed builds. Only actually deploy for a successful master build; for
    # every other trigger type (push, workflow_dispatch) just proceed.
    if: >
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest

    env:
      # Which OrcaSlicer engine version's release family to deploy. Must
      # match build-wasm.yml's ORCA_VERSION default — bump both together
      # when upgrading the upstream OrcaSlicer version. The actual asset tag
      # is resolved at deploy time in "Download WASM artifacts" below, since
      # releases are immutable (wasm-$ORCA_VERSION, then wasm-$ORCA_VERSION-
      # patch1, -patch2, ... for later fixes — see build-wasm.yml).
      ORCA_VERSION: v2.4.0

    steps:
      - uses: actions/checkout@v7
        with:
          # workflow_run doesn't check out the triggering commit by default —
          # it defaults to master's current HEAD *at trigger time*, which can
          # already have moved past the commit build-wasm.yml actually built
          # for. Pin explicitly so we deploy the exact engine+frontend pair
          # that was built together, not whatever landed on master meanwhile.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          # Full history + tags — the auto-bump step below needs to see the
          # latest vX.Y.Z release tag to decide whether to bump the patch.
          fetch-depth: 0

      # ── SSH deploy key for the release push ───────────────────────────
      # master requires a PR for every push (branch ruleset), and the
      # default GITHUB_TOKEN has no bypass for it. Rather than use a personal
      # PAT (ties CI to one person's account/identity — too broad a blast
      # radius for what this needs), push via a repo-scoped deploy key
      # ("release_deploy_key", write-enabled) instead: deploy keys are
      # already on the ruleset's bypass list, so no ruleset change was
      # needed, and a leaked key only grants push access to this one repo.
      - name: Configure SSH deploy key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/release_deploy_key
          ${{ secrets.RELEASE_KEY }}
          EOF
          chmod 600 ~/.ssh/release_deploy_key
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config core.sshCommand "ssh -i ~/.ssh/release_deploy_key -o IdentitiesOnly=yes"
          git remote set-url origin "git@github.com:${{ github.repository }}.git"

      # ── Auto-bump app version ──────────────────────────────────────────
      # Replaces the old manual /release flow (hand-editing package.json +
      # status.md, committing "chore(release): bump to vX.Y.Z"). Every deploy
      # now bumps the version itself: if package.json's version still matches
      # the latest vX.Y.Z tag, nobody bumped it in this push, so auto-increment
      # the patch number. If it already differs (someone deliberately bumped
      # minor/major in their PR), respect that value instead of bumping again.
      - name: Auto-bump app version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT_VERSION=$(jq -r .version package.json)
          # Query the remote directly rather than relying on local tag refs:
          # actions/checkout's `ref: <sha>` above pins to a raw commit, and
          # (unlike checking out a branch) that mode does not reliably bring
          # tags down even with fetch-depth: 0 -- confirmed live, where this
          # used to read no v0.7.1 tag at all and treat 0.7.1 as a "manual"
          # bump to preserve, silently never auto-incrementing.
          LATEST_TAG=$(git ls-remote --tags --refs origin \
            | sed 's#.*refs/tags/##' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -n1)
          LATEST_VERSION=${LATEST_TAG#v}

          if [ -z "$LATEST_VERSION" ] || [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "Auto-bumping ${CURRENT_VERSION} -> ${NEW_VERSION} (patch)"
          else
            NEW_VERSION="$CURRENT_VERSION"
            echo "package.json already bumped to ${NEW_VERSION} manually — using as-is"
          fi

          TODAY=$(date -u +%Y-%m-%d)
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "$NEW_VERSION" '.version = $v | .packages[""].version = $v' package-lock.json > package-lock.json.tmp && mv package-lock.json.tmp package-lock.json
          sed -i -E "s/Ostatnia aktualizacja: \*\*[0-9-]+\*\*/Ostatnia aktualizacja: **${TODAY}**/" mkdocs-docs/status.md
          sed -i -E "s/wersja aplikacji: \*\*v[0-9]+\.[0-9]+\.[0-9]+\*\*/wersja aplikacji: **v${NEW_VERSION}**/" mkdocs-docs/status.md

          git add package.json package-lock.json mkdocs-docs/status.md
          if git diff --cached --quiet; then
            echo "No version-file changes to commit"
          else
            git commit -m "chore(release): auto-bump to v${NEW_VERSION}"
            # A concurrent deploy could have pushed to master between our checkout
            # and this push (concurrency's cancel-in-progress narrows but doesn't
            # eliminate the window) — retry against the latest master once or
            # twice rather than failing the whole deploy over a race. Track
            # success explicitly: silently falling through after 3 failed
            # attempts (e.g. a read-only deploy key, an auth problem) would
            # otherwise look like a normal deploy while never actually
            # publishing the version bump.
            pushed=""
            for attempt in 1 2 3; do
              if git push origin HEAD:master; then
                pushed=1
                break
              fi
              echo "Push rejected (attempt ${attempt}) — rebasing onto latest master and retrying"
              git fetch origin master
              git rebase origin/master
            done
            if [ -z "$pushed" ]; then
              echo "::error::Failed to push version-bump commit to master after 3 attempts"
              exit 1
            fi
          fi

          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          # Distinguish "tag already exists" (expected when nothing needed
          # bumping) from any other push failure (auth/permissions) -- the
          # latter must fail the job loudly, not get swallowed as if it were
          # the same harmless case.
          if ! git push origin "v${NEW_VERSION}" 2> push-tag.err; then
            if grep -qi "already exists" push-tag.err; then
              echo "Tag v${NEW_VERSION} already exists on remote, skipping"
            else
              cat push-tag.err >&2
              echo "::error::Failed to push tag v${NEW_VERSION}"
              exit 1
            fi
          fi
          rm -f push-tag.err
          echo "Deploying as v${NEW_VERSION}"

      # ── Node / Vite app ──────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          # Match the version CI type-checks/builds against (ci.yml uses 22).
          node-version: '22'
          cache: npm

      - run: npm ci

      # ── Download WASM artifacts ──────────────────────────────────────
      # Primary: resolve the latest immutable release for $ORCA_VERSION
      # (wasm-$ORCA_VERSION, or wasm-$ORCA_VERSION-patchN if any fixes have
      # been published since — see build-wasm.yml) and download it.
      # Fallback: restore from the previously-deployed gh-pages tree so a push
      # that only touches UI/docs never fails just because the WASM release has
      # not been created yet (e.g. immediately after a PR merge before the
      # build-wasm workflow has run).
      - name: Download WASM artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public/wasm
          BASE_TAG="wasm-$ORCA_VERSION"
          # Plain string ops (==, startswith, ltrimstr), not a regex — BASE_TAG
          # contains "." which is a regex metacharacter; matching it literally
          # this way sidesteps needing to escape it correctly in a jq/bash
          # string that's already been through one layer of interpolation.
          WASM_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq "
            [.[] | .tagName | select(. == \"${BASE_TAG}\" or startswith(\"${BASE_TAG}-patch\"))]
            | sort_by(if . == \"${BASE_TAG}\" then 0 else (ltrimstr(\"${BASE_TAG}-patch\") | tonumber) end)
            | last // empty
          ")
          if [ -n "$WASM_TAG" ]; then
            gh release download "$WASM_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "slicer.*" \
              --dir public/wasm
            echo "Downloaded WASM from release $WASM_TAG"
            # Human-readable label for the app header (App.tsx / __ORCA_ENGINE_VERSION__)
            # — the *resolved* tag (e.g. "v2.4.0-patch2"), not just $ORCA_VERSION, so the
            # header actually reflects which bridge/patch build is running. Showing the
            # static $ORCA_VERSION here was exactly the kind of mismatch this whole
            # cache-busting fix was about — the header would have kept saying "v2.4.0"
            # even while patch2's session-handle API was live underneath it.
            echo "ENGINE_LABEL=${WASM_TAG#wasm-}" >> "$GITHUB_ENV"
          else
            echo "::warning::No release found for $ORCA_VERSION (checked $BASE_TAG and $BASE_TAG-patch*) — restoring WASM from previous gh-pages deploy"
            git fetch origin gh-pages 2>/dev/null || true
            for f in slicer.js slicer.wasm; do
              git show "origin/gh-pages:app/wasm/$f" > "public/wasm/$f" 2>/dev/null \
                && echo "  restored $f from gh-pages" \
                || echo "::warning::  $f not found in gh-pages either"
            done
            # No resolved release to point to — say so rather than silently claiming
            # $ORCA_VERSION, which may not match whatever was actually restored.
            echo "ENGINE_LABEL=${ORCA_VERSION} (restored, unverified)" >> "$GITHUB_ENV"
          fi
          ls -lh public/wasm/ || true

      # ── Derive a cache-busting key for the WASM engine ────────────────
      # Hashing the actual downloaded slicer.wasm bytes (rather than reusing
      # $WASM_TAG or the app's package.json version) means the frontend's
      # ?v=<key> query param — and therefore whether the PWA CacheFirst cache
      # and the CDN edge treat it as a new URL — always tracks the engine
      # binary that's actually being shipped, in both the release-download and
      # the gh-pages-restore fallback path above. This is what closes the bug
      # where a bridge/API change (395d3fe) landed on master, published a new
      # WASM release, but package.json's version didn't change — so the old
      # ?v=<app-version> query stayed identical and browsers/CDN kept serving
      # the stale, ABI-mismatched engine indefinitely.
      - name: Compute WASM cache-busting key
        run: |
          WASM_VERSION=$(sha256sum public/wasm/slicer.wasm | cut -c1-16)
          echo "WASM_VERSION=$WASM_VERSION" >> "$GITHUB_ENV"
          echo "Using WASM cache key: $WASM_VERSION"

      # ── Build Vite app ───────────────────────────────────────────────
      - name: Build Vite app
        run: npm run build
        env:
          # App served at /OrcaWeb/app/ on GitHub Pages
          VITE_BASE: /OrcaWeb/app/
          # WASM served from same origin — no external URL needed.
          # worker-singleton.ts uses import.meta.env.BASE_URL + 'wasm'
          VITE_WASM_VERSION: ${{ env.WASM_VERSION }}
          # Human-readable engine label shown in the app header (App.tsx) — the
          # actually-resolved release tag (e.g. "v2.4.0-patch2"), set by the
          # "Download WASM artifacts" step above. Deliberately not $ORCA_VERSION:
          # that's just the upstream target family and stays "v2.4.0" across every
          # patch release, so it can't tell you which bridge/patch build is live.
          VITE_ORCA_VERSION: ${{ env.ENGINE_LABEL }}

      # ── Python / MkDocs ─────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material

      - name: Build MkDocs
        run: mkdocs build --config-file mkdocs.yml --site-dir dist-docs --strict

      # ── Assemble gh-pages tree ───────────────────────────────────────
      - name: Assemble output
        run: |
          mkdir -p gh-pages/app gh-pages/docs
          # Landing page at root
          cp landing/index.html gh-pages/index.html
          # Slicer app at /app/
          cp -r dist/. gh-pages/app/
          # MkDocs at /docs/
          cp -r dist-docs/. gh-pages/docs/
          # Prevent Jekyll processing
          touch gh-pages/.nojekyll

      # ── Deploy ───────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true
