name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # ── Auto-tag on release commits ───────────────────────────────────
      - name: Create release tag
        if: startsWith(github.event.head_commit.message, 'chore(release): bump to v')
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Tagged $TAG on $(git rev-parse HEAD)"

      # ── Node / Vite app ──────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # ── Download WASM artifacts ──────────────────────────────────────
      # Primary: download slicer.js + slicer.wasm from the wasm-v2.3.2 release.
      # Fallback: restore from the previously-deployed gh-pages tree so a push
      # that only touches UI/docs never fails just because the WASM release has
      # not been created yet (e.g. immediately after a PR merge before the
      # build-wasm workflow has run).
      - name: Download WASM artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public/wasm
          WASM_TAG="wasm-v2.3.2"
          if gh release view "$WASM_TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            gh release download "$WASM_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "slicer.*" \
              --dir public/wasm
            echo "Downloaded WASM from release $WASM_TAG"
          else
            echo "::warning::Release $WASM_TAG not found — restoring WASM from previous gh-pages deploy"
            git fetch origin gh-pages 2>/dev/null || true
            for f in slicer.js slicer.wasm; do
              git show "origin/gh-pages:app/wasm/$f" > "public/wasm/$f" 2>/dev/null \
                && echo "  restored $f from gh-pages" \
                || echo "::warning::  $f not found in gh-pages either"
            done
          fi
          ls -lh public/wasm/ || true

      # ── Build Vite app ───────────────────────────────────────────────
      - name: Build Vite app
        run: npm run build
        env:
          # App served at /OrcaWeb/app/ on GitHub Pages
          VITE_BASE: /OrcaWeb/app/
          # WASM served from same origin — no external URL needed.
          # worker-singleton.ts uses import.meta.env.BASE_URL + 'wasm'

      # ── Python / MkDocs ─────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material

      - name: Build MkDocs
        run: mkdocs build --config-file mkdocs.yml --site-dir dist-docs --strict

      # ── Assemble gh-pages tree ───────────────────────────────────────
      - name: Assemble output
        run: |
          mkdir -p gh-pages/app gh-pages/docs
          # Landing page at root
          cp landing/index.html gh-pages/index.html
          # Slicer app at /app/
          cp -r dist/. gh-pages/app/
          # MkDocs at /docs/
          cp -r dist-docs/. gh-pages/docs/
          # Prevent Jekyll processing
          touch gh-pages/.nojekyll

      # ── Deploy ───────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true
