name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # ── Node / Vite app ──────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # ── Download WASM artifacts ──────────────────────────────────────
      # Artifacts are built by the build-wasm.yml workflow and uploaded to a
      # release tagged wasm-v2.3.2 in this repo.  The v2.3.2 engine has no
      # slicer.data (the orca/resources preload was dropped — see
      # orca-wasm/wasm/CMakeLists.txt), so only slicer.js + slicer.wasm are
      # downloaded and no chunk-splitting is needed.
      - name: Download WASM artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public/wasm
          WASM_TAG="wasm-v2.3.2"
          gh release download "$WASM_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "slicer.*" \
            --dir public/wasm
          ls -lh public/wasm/

      # ── Build Vite app ───────────────────────────────────────────────
      - name: Build Vite app
        run: npm run build
        env:
          # App served at /OrcaWeb/app/ on GitHub Pages
          VITE_BASE: /OrcaWeb/app/
          # WASM served from same origin — no external URL needed.
          # worker-singleton.ts uses import.meta.env.BASE_URL + 'wasm'

      # ── Python / MkDocs ─────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material

      - name: Build MkDocs
        run: mkdocs build --config-file mkdocs.yml --site-dir dist-docs --strict

      # ── Assemble gh-pages tree ───────────────────────────────────────
      - name: Assemble output
        run: |
          mkdir -p gh-pages/app gh-pages/docs
          # Landing page at root
          cp landing/index.html gh-pages/index.html
          # Slicer app at /app/
          cp -r dist/. gh-pages/app/
          # MkDocs at /docs/
          cp -r dist-docs/. gh-pages/docs/
          # Prevent Jekyll processing
          touch gh-pages/.nojekyll

      # ── Deploy ───────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true
