name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # ── Node / Vite app ──────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # ── Download WASM artifacts ──────────────────────────────────────
      # Artifacts are built by the build-wasm.yml workflow and uploaded to a
      # release tagged wasm-v2.3.2 in this repo.
      # slicer.data can exceed GitHub Pages' 100 MB per-file limit, so it is
      # split into ≈72 MB chunks.  The worker transparently reassembles them
      # (see src/workers/slicer.worker.ts — falls back to a single file for
      # local dev where public/wasm/slicer.data exists in full).
      - name: Download & split WASM artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public/wasm
          WASM_TAG="wasm-v2.3.2"
          gh release download "$WASM_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "slicer.*" \
            --dir public/wasm
          ls -lh public/wasm/
          # Split slicer.data if it exists and is larger than 90 MB
          if [[ -f public/wasm/slicer.data ]]; then
            SIZE=$(stat -c%s public/wasm/slicer.data)
            echo "slicer.data size: ${SIZE} bytes"
            if (( SIZE > 94371840 )); then
              echo "Splitting slicer.data into ≈72 MB chunks…"
              split -b 75497472 public/wasm/slicer.data public/wasm/slicer.data.part
              mv public/wasm/slicer.data.partaa public/wasm/slicer.data.part0
              mv public/wasm/slicer.data.partab public/wasm/slicer.data.part1
              # Handle case where there may be a third chunk (very large bundles)
              [[ -f public/wasm/slicer.data.partac ]] && mv public/wasm/slicer.data.partac public/wasm/slicer.data.part2
              rm public/wasm/slicer.data
            fi
          fi
          ls -lh public/wasm/

      # ── Build Vite app ───────────────────────────────────────────────
      - name: Build Vite app
        run: npm run build
        env:
          # App served at /OrcaWeb/app/ on GitHub Pages
          VITE_BASE: /OrcaWeb/app/
          # WASM served from same origin — no external URL needed.
          # worker-singleton.ts uses import.meta.env.BASE_URL + 'wasm'

      # ── Python / MkDocs ─────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material

      - name: Build MkDocs
        run: mkdocs build --config-file mkdocs.yml --site-dir dist-docs --strict

      # ── Assemble gh-pages tree ───────────────────────────────────────
      - name: Assemble output
        run: |
          mkdir -p gh-pages/app gh-pages/docs
          # Landing page at root
          cp landing/index.html gh-pages/index.html
          # Slicer app at /app/
          cp -r dist/. gh-pages/app/
          # MkDocs at /docs/
          cp -r dist-docs/. gh-pages/docs/
          # Prevent Jekyll processing
          touch gh-pages/.nojekyll

      # ── Deploy ───────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_orphan: true
