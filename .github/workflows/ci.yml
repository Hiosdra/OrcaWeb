name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
