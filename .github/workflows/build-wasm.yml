name: Build WASM

# Trigger manually or on a tag v*.*.* that signals a new OrcaSlicer target.
# The compiled artifacts are uploaded as a release asset on OrcaWeb and then
# pulled into the deploy workflow.
on:
  workflow_dispatch:
    inputs:
      orca_version:
        description: 'OrcaSlicer tag to build (e.g. v2.3.2)'
        default: 'v2.3.2'
        required: true
  push:
    tags: ['v*.*.*']

permissions:
  contents: write  # needed to create/update releases

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # deps ~60 min + main build ~60 min

    env:
      ORCA_VERSION: ${{ github.event.inputs.orca_version || github.ref_name }}
      EMSDK: /opt/emsdk

    steps:
      - uses: actions/checkout@v4

      # ── Emscripten ──────────────────────────────────────────────────
      - name: Install Emscripten
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git /opt/emsdk
          /opt/emsdk/emsdk install latest
          /opt/emsdk/emsdk activate latest

      # ── System deps ─────────────────────────────────────────────────
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          # Minimal set — building headless WASM (no GUI, no system GTK/webkit needed)
          sudo apt-get install -y \
            ninja-build python3 cmake pkg-config \
            m4 texinfo libssl-dev

      # ── Checkout OrcaSlicer at requested tag ────────────────────────
      # Do a plain shallow clone instead of git submodule (submodule is not
      # registered in the index, only .gitmodules exists).
      - name: Checkout OrcaSlicer ${{ env.ORCA_VERSION }}
        run: |
          git clone --depth 1 --branch "$ORCA_VERSION" \
            https://github.com/SoftFever/OrcaSlicer.git \
            orca-wasm/orca

      # ── Apply WASM patches before dep build ─────────────────────────
      - name: Patch OrcaSlicer source
        run: python3 orca-wasm/patches/apply.py

      # ── Restore cached WASM deps ────────────────────────────────────
      - name: Restore dep cache
        id: dep-cache
        uses: actions/cache@v4
        with:
          path: orca-wasm/deps-install
          key: wasm-deps-${{ runner.os }}-orca-${{ env.ORCA_VERSION }}-v1

      # ── Build OrcaSlicer's bundled deps for WASM ────────────────────
      # Uses OrcaSlicer's own cmake deps system; skips GUI-only & heavy deps.
      # Only runs on a cache miss.
      - name: Build OrcaSlicer deps for WASM
        if: steps.dep-cache.outputs.cache-hit != 'true'
        run: |
          source /opt/emsdk/emsdk_env.sh
          WORK="$(pwd)"
          mkdir -p orca-wasm/deps-build

          emcmake cmake \
            -S orca-wasm/orca/deps \
            -B orca-wasm/deps-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${WORK}/orca-wasm/deps-install" \
            -DDEP_WX_GTK3=OFF \
            -DDEP_WXWIDGETS=OFF \
            -DDEP_OPENCASCADE=OFF \
            -DDEP_OPENVDB=OFF \
            -DDEP_OPENCV=OFF

          emmake cmake --build orca-wasm/deps-build -j4

      # ── Configure WASM build ─────────────────────────────────────────
      - name: Configure WASM build
        run: |
          source /opt/emsdk/emsdk_env.sh
          WORK="$(pwd)"
          mkdir -p orca-wasm/build-wasm

          emcmake cmake \
            -S orca-wasm/orca \
            -B orca-wasm/build-wasm \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSLIC3R_WASM=ON \
            -DSLIC3R_GUI=OFF \
            -DSLIC3R_STATIC=ON \
            -DSLIC3R_OPENCASCADE=OFF \
            -DSLIC3R_OPENGL_IMGUI=OFF \
            -DCMAKE_PREFIX_PATH="${WORK}/orca-wasm/deps-install" \
            -DCMAKE_MODULE_PATH="${WORK}/orca-wasm/cmake" \
            -DTBB_SHIM_DIR="${WORK}/orca-wasm/wasm/shims" \
            -DORCA_WEB_BRIDGE_DIR="${WORK}/orca-wasm/bridge" \
            -DORCA_WEB_WASM_DIR="${WORK}/orca-wasm/wasm" \
            -DORCA_WEB_SHIM_DIR="${WORK}/orca-wasm/wasm/shims"

      # ── Build WASM module ────────────────────────────────────────────
      - name: Build WASM module
        run: |
          source /opt/emsdk/emsdk_env.sh
          emmake cmake --build orca-wasm/build-wasm --target slicer -j4

      # ── Verify & package artifacts ───────────────────────────────────
      # wasm/CMakeLists.txt POST_BUILD already copies to public/wasm/.
      - name: Package WASM artifacts
        run: |
          echo "--- Build output ---"
          ls -lh orca-wasm/build-wasm/wasm/ 2>/dev/null || ls -lh orca-wasm/build-wasm/ || true
          echo "--- public/wasm/ ---"
          ls -lh public/wasm/ 2>/dev/null || true

          # Copy from build output if POST_BUILD didn't run (e.g. no POST_BUILD copy)
          BUILDDIR="orca-wasm/build-wasm/wasm"
          if [[ ! -f public/wasm/slicer.js ]]; then
            mkdir -p public/wasm
            cp "${BUILDDIR}/slicer.js"   public/wasm/slicer.js
            cp "${BUILDDIR}/slicer.wasm" public/wasm/slicer.wasm
            cp "${BUILDDIR}/slicer.data" public/wasm/slicer.data
          fi

          mkdir -p wasm-artifacts
          cp public/wasm/slicer.js   wasm-artifacts/
          cp public/wasm/slicer.wasm wasm-artifacts/
          cp public/wasm/slicer.data wasm-artifacts/
          ls -lh wasm-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orca-wasm-${{ env.ORCA_VERSION }}
          path: wasm-artifacts/
          retention-days: 90

      # ── Create / update GitHub release with WASM assets ─────────────
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="wasm-$ORCA_VERSION"
          # Create release if it doesn't exist
          gh release create "$TAG" \
            --title "WASM build for OrcaSlicer $ORCA_VERSION" \
            --notes "Pre-built WASM artifacts for OrcaSlicer $ORCA_VERSION.\n\nUsed internally by the deploy workflow." \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          # Upload / overwrite assets
          for f in wasm-artifacts/*; do
            gh release upload "$TAG" "$f" --clobber --repo "$GITHUB_REPOSITORY"
          done
