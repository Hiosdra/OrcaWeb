name: Build WASM

# Trigger manually, on a tag wasm-v*.*.* that signals a new OrcaSlicer target,
# or automatically whenever a merge to master touches the WASM build pipeline.
# The compiled artifacts are uploaded as a release asset on OrcaWeb and then
# pulled into the deploy workflow (which chains off this workflow's completion
# via workflow_run — see deploy.yml).
on:
  workflow_dispatch:
    inputs:
      orca_version:
        description: 'OrcaSlicer tag to build (e.g. v2.4.2)'
        default: 'v2.4.2'
        required: true
  push:
    tags: ['wasm-v*.*.*']
    # Auto-publish a new patch release whenever a bridge/build-pipeline change
    # lands on master, instead of relying on someone remembering to trigger
    # workflow_dispatch — that gap (engine changed on master, nobody rebuilt
    # the release before the next deploy) is exactly what caused the
    # "Engine error" incident from 395d3fe. Path-filtered for the same reason
    # as the pull_request trigger below: skip the multi-hour build on pushes
    # that don't touch orca-wasm/.
    branches: [master]
    paths:
      - 'orca-wasm/**'
      - '.github/workflows/build-wasm.yml'
  # Run on PRs that touch the WASM build pipeline so compilation breakage is
  # caught before merge.  Path-filtered to avoid a ~3 h build on UI-only PRs.
  pull_request:
    paths:
      - 'orca-wasm/**'
      - '.github/workflows/build-wasm.yml'

permissions:
  contents: write  # needed to create/update releases

# Two overlapping publishing builds (workflow_dispatch, or a tag push right
# after one) for the same ORCA_VERSION would independently compute the same
# next patch number and collide on `gh release create` — the loser fails
# outright after a multi-hour build with nothing published (see "Upload to
# GitHub Release" below, which intentionally has no `|| true` fallback
# anymore now that releases are immutable). Serialize same-version builds
# so races queue instead of colliding; deliberately no cancel-in-progress,
# since cancelling a multi-hour build mid-flight would waste it for nothing.
# PR-validation builds (which never publish) get their own per-PR group so
# unrelated PRs touching orca-wasm/ don't needlessly queue behind each other.
concurrency:
  group: build-wasm-${{ github.event_name == 'pull_request' && github.event.pull_request.number || (github.event.inputs.orca_version || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'v2.4.2') }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # deps ~100 min (incl. OCCT ~45 min) + main build ~60 min

    # Two variants built from the same source, same as
    # poc/wasm-threads/build.sh's dual-artifact pattern (see
    # ADR-011): "st" is today's existing sequential build
    # (unchanged behavior), "mt" links against real oneTBB (built from
    # source below, real Emscripten pthreads — see ADR-011) for real
    # multi-core slicing. fail-fast: false so an "mt"-only failure (the
    # newer, less-proven variant) never cancels the "st" build that
    # production already depends on.
    strategy:
      fail-fast: false
      matrix:
        variant: [st, mt]

    env:
      ORCA_VERSION: ${{ github.event.inputs.orca_version || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'v2.4.2' }}
      OCCT_VERSION: "7.8.1"
      # Pinned (not "latest") for reproducible builds — matches the version
      # documented for local builds in mkdocs-docs/wasm-build.md.
      EMSDK_VERSION: "3.1.74"
      ONETBB_VERSION: "v2021.13.2"
      EMSDK: /opt/emsdk
      # ── Variant-derived settings ─────────────────────────────────────
      # Everything that differs between st/mt boils down to these values;
      # every step below reads them instead of hardcoding "slicer" or the
      # shim path, so the two variants share one script. EXTRA_CXX_FLAGS
      # carries -pthread for mt (empty for st) so every dep + the engine
      # compile with pthread-consistent codegen — mixing pthread and
      # non-pthread objects doesn't link (see ADR-011).
      OUTPUT_NAME: ${{ matrix.variant == 'mt' && 'slicer-mt' || 'slicer' }}
      BOOST_THREADING: ${{ matrix.variant == 'mt' && 'multi' || 'single' }}
      SLIC3R_WASM_MT: ${{ matrix.variant == 'mt' && 'ON' || 'OFF' }}
      EXTRA_CXX_FLAGS: ${{ matrix.variant == 'mt' && '-pthread' || '' }}

    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so "Upload to GitHub Release" below can compute a
          # changelog (git log between the previous wasm-* release tag and
          # HEAD). Negligible next to a 1-3 h build.
          fetch-depth: 0

      # ── Node (for the post-build smoke test) ─────────────────────────
      - uses: actions/setup-node@v7
        with:
          node-version: 22

      # ── Emscripten ──────────────────────────────────────────────────
      # Cache the whole emsdk tree (toolchain + activated config). After the
      # first run this also carries the embuilder-built sysroot ports
      # (zlib/png/jpeg), so that step becomes a no-op on subsequent runs.
      #
      # Variant-suffixed (NOT shared across st/mt, despite the toolchain
      # binary itself being identical): the cache also carries em++'s
      # compiled system-library sysroot ($EMSDK/upstream/emscripten/cache/
      # sysroot/), which does differ by -pthread — found live when mt's link
      # step failed with "--shared-memory is disallowed by exceptions.o
      # because it was not compiled with 'atomics' or 'bulk-memory'
      # features", i.e. a non-pthread system object got reused from a shared
      # cache instead of em++ rebuilding the pthread variant.
      - name: Cache Emscripten
        id: cache-emsdk
        uses: actions/cache@v6
        with:
          path: /opt/emsdk
          key: emsdk-${{ runner.os }}-${{ matrix.variant }}-${{ env.EMSDK_VERSION }}-v1

      - name: Install Emscripten
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git /opt/emsdk
          /opt/emsdk/emsdk install "$EMSDK_VERSION"
          /opt/emsdk/emsdk activate "$EMSDK_VERSION"

      # ── System deps ─────────────────────────────────────────────────
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          # Minimal set — building headless WASM (no GUI, no system GTK/webkit needed)
          sudo apt-get install -y \
            ninja-build python3 cmake pkg-config \
            m4 texinfo libssl-dev ccache

      # ── ccache ───────────────────────────────────────────────────────
      # The libslic3r/bridge compile (293 ninja targets) always rebuilds from
      # scratch — unlike deps-install and emsdk, the build-wasm/ object dir
      # isn't (and can't easily be) cached across runs. That makes even a
      # one-line link-flag or bridge/*.cpp change cost the full ~50-60 min
      # compile. ccache turns that into a near-instant rebuild for unchanged
      # translation units. Keyed per variant — st/mt object code differs
      # (different shim dir, different -pthread compile flags for mt), so a
      # shared cache would just be permanent misses either way.
      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ccache
          key: wasm-ccache-${{ runner.os }}-${{ matrix.variant }}-orca-${{ env.ORCA_VERSION }}-${{ github.run_id }}
          restore-keys: |
            wasm-ccache-${{ runner.os }}-${{ matrix.variant }}-orca-${{ env.ORCA_VERSION }}-
            wasm-ccache-${{ runner.os }}-${{ matrix.variant }}-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          echo "CCACHE_DIR=$HOME/.cache/ccache" >> "$GITHUB_ENV"

      # ── Checkout OrcaSlicer at requested tag ────────────────────────
      # Do a plain shallow clone — the git submodule is not registered in index.
      - name: Checkout OrcaSlicer ${{ env.ORCA_VERSION }}
        run: |
          git clone --depth 1 --branch "$ORCA_VERSION" \
            https://github.com/SoftFever/OrcaSlicer.git \
            orca-wasm/orca

      # ── Apply WASM patches ───────────────────────────────────────────
      - name: Patch OrcaSlicer source
        run: python3 orca-wasm/patches/apply.py

      # ── Restore cached WASM deps ─────────────────────────────────────
      # Cache key: runner OS + variant + OrcaSlicer version + deps script
      # version. Cached dir: orca-wasm/deps-install/ (all dep installs
      # unified here; each matrix leg runs on its own isolated runner, so
      # st/mt never share a filesystem regardless of the path, but the key
      # is still variant-suffixed so a restore-keys fallback can never pull
      # an st cache into an mt job or vice versa — e.g. Boost's threading
      # variant is genuinely different object code, and CGAL/others pick up
      # Boost transitively via cmake config).
      # Each dep build uses an internal stamp file so partial caches are safe:
      # a step is a no-op if its stamp already exists, regardless of cache hit.
      - name: Restore dep cache
        id: dep-cache
        uses: actions/cache/restore@v6
        with:
          path: orca-wasm/deps-install
          key: wasm-deps-${{ runner.os }}-${{ matrix.variant }}-orca-${{ env.ORCA_VERSION }}-occt-${{ env.OCCT_VERSION }}-onetbb-${{ env.ONETBB_VERSION }}-v17
          # On a key bump, fall back to the closest previous cache. Stamp files
          # make partial deps-install safe, so only changed deps get rebuilt
          # instead of redoing the full ~3 h build (OCCT alone is ~45 min).
          # NOTE: because of this fallback, bumping a dependency's pinned
          # version here is NOT enough to force a rebuild of it — the stamp
          # file for that step must also change (see the OCCT step's
          # version-suffixed stamp for the pattern), otherwise a restored
          # stale cache silently keeps the old version. Bit us once already:
          # Eigen 3.4.0->5.0.1 in 840c260 kept resolving against a restored
          # 3.4.0 install because .headers_built wasn't version-suffixed.
          restore-keys: |
            wasm-deps-${{ runner.os }}-${{ matrix.variant }}-orca-${{ env.ORCA_VERSION }}-occt-${{ env.OCCT_VERSION }}-
            wasm-deps-${{ runner.os }}-${{ matrix.variant }}-orca-${{ env.ORCA_VERSION }}-
            wasm-deps-${{ runner.os }}-${{ matrix.variant }}-

      # ── Boost ────────────────────────────────────────────────────────
      # Build Boost using b2 with the clang-emscripten toolset.  The standard
      # archives.boost.org tarball does not ship CMakeLists.txt, so the CMake
      # build approach never works without the GitHub super-project checkout.
      # We instead use b2 and patch OrcaSlicer's CMP0167 to OLD so that the
      # legacy FindBoost.cmake (module mode) is used — it works perfectly with
      # b2-installed Boost given BOOST_ROOT + Boost_NO_BOOST_CMAKE=ON.
      #
      # threading=$BOOST_THREADING switches this between the existing
      # single-threaded build (st) and a real multi-threaded Boost (mt) —
      # the mt variant also drops BOOST_THREAD_DONT_USE_PTHREAD (which
      # explicitly disables Boost.Thread's own pthread support) and adds
      # -pthread to Boost's own compile flags, since Emscripten's -pthread
      # affects codegen (TLS model, atomics) and mixing pthread/non-pthread
      # object code is not safe to link — see ADR-011.
      #
      # BOOST_LOG_NO_THREADS stays defined for BOTH variants, unlike the
      # other two — found live when mt's link step failed with ~30
      # undefined `boost::log::v2s_st::...` symbols. BOOST_LOG_NO_THREADS
      # selects Boost.Log's ABI (its inline namespace tag, v2s_st vs. the
      # real-threading tag), and OrcaSlicer's own upstream CMakeLists.txt
      # unconditionally passes -DBOOST_LOG_NO_THREADS=1 when compiling
      # libslic3r itself, regardless of our SLIC3R_WASM_MT flag (confirmed
      # in the actual compile command lines from both matrix legs) — so
      # every libslic3r translation unit always calls the v2s_st-tagged
      # API. libboost_log.a must be built to match that tag or none of its
      # symbols resolve at link time, irrespective of whether Boost.Log's
      # *internal* implementation is itself thread-safe.
      - name: Build WASM deps — Boost
        run: |
          source "$EMSDK/emsdk_env.sh"
          BOOST_VERSION="1.83.0"
          BOOST_UNDERSCORE="${BOOST_VERSION//./_}"
          INSTALL="$(pwd)/orca-wasm/deps-install"
          # _v2 suffix: manually bumped, not tied to BOOST_VERSION — the
          # BOOST_LOG_NO_THREADS fix above changed Boost's build *flags*,
          # not its pinned version, so BOOST_VERSION alone wouldn't
          # invalidate a stale cached build. Restore-keys below prefix-match
          # regardless of this suffix (see "Restore dep cache"'s own
          # comment on why a version bump alone isn't sufficient), so
          # without this the mt job would restore its OLD, wrongly-built
          # libboost_log.a from cache and skip rebuilding it entirely.
          STAMP="${INSTALL}/.boost_built_${{ matrix.variant }}_v2"
          mkdir -p "${INSTALL}"
          [[ -f "${STAMP}" ]] && echo "[boost] stamp exists — skip" && exit 0

          echo "[boost] downloading Boost ${BOOST_VERSION}…"
          mkdir -p /tmp/boost
          curl -fL --retry 3 \
            "https://archives.boost.org/release/${BOOST_VERSION}/source/boost_${BOOST_UNDERSCORE}.tar.gz" \
            | tar xz -C /tmp/boost
          cd "/tmp/boost/boost_${BOOST_UNDERSCORE}"

          echo "[boost] bootstrapping b2…"
          ./bootstrap.sh --with-toolset=clang

          echo "[boost] writing user-config.jam for emscripten toolset…"
          printf "using clang : emscripten : em++ :\n<archiver>emar\n<ranlib>emranlib ;\n" > ~/user-config.jam

          echo "[boost] building with b2 (emscripten, static, threading=${BOOST_THREADING})…"
          B2_DEFINES=(
            "define=BOOST_LOG_WITHOUT_SYSLOG=1"
            # Always on — see the step comment above for why this must match
            # libslic3r's own (unconditional, upstream) compile flags rather
            # than varying by matrix.variant.
            "define=BOOST_LOG_NO_THREADS=1"
          )
          if [[ "${{ matrix.variant }}" == "mt" ]]; then
            B2_EXTRA_CXXFLAGS="cxxflags=-pthread"
          else
            # Existing st behavior, unchanged.
            B2_DEFINES+=(
              "define=BOOST_THREAD_DONT_USE_PTHREAD=1"
            )
            B2_EXTRA_CXXFLAGS=""
          fi

          ./b2 \
            toolset=clang-emscripten \
            variant=release \
            link=static \
            threading="${BOOST_THREADING}" \
            --layout=system \
            --prefix="${INSTALL}" \
            --with-atomic \
            --with-chrono \
            --with-date_time \
            --with-filesystem \
            --with-iostreams \
            --with-locale \
            --with-log \
            --with-nowide \
            --with-program_options \
            --with-regex \
            --with-system \
            --with-thread \
            "${B2_DEFINES[@]}" \
            ${B2_EXTRA_CXXFLAGS} \
            -j"$(nproc)" \
            install

          echo "[boost] installed headers:"
          ls "${INSTALL}/include/boost/version.hpp" && echo "  boost/version.hpp OK"
          echo "[boost] installed libs (sample):"
          ls "${INSTALL}/lib/libboost_system"* 2>/dev/null | head -3 || echo "  no libboost_system found!"
          touch "${STAMP}"

      # ── GMP / MPFR / CGAL ────────────────────────────────────────────
      # No threading-specific *code paths* (see ADR-011), but GMP/MPFR
      # are real compiled libraries statically
      # linked into the final slicer-mt.wasm — every object linked into a
      # --shared-memory binary must itself be compiled with atomics/
      # bulk-memory support (i.e. -pthread), regardless of whether that
      # object's own code ever touches OS threads. Missing this on OCCT
      # (a separate step, fixed above) caused a real wasm-ld
      # "--shared-memory is disallowed by exceptions.o" link failure;
      # GMP/MPFR carry the identical risk and are fixed the same way here,
      # preemptively, rather than waiting for another CI round to find each
      # one individually. CGAL is header-only (no compiled objects), so it
      # doesn't need this.
      - name: Build WASM deps — GMP / MPFR / CGAL
        run: |
          source "$EMSDK/emsdk_env.sh"
          INSTALL="$(pwd)/orca-wasm/deps-install"
          STAMP="${INSTALL}/.math_built_${{ matrix.variant }}"
          [[ -f "${STAMP}" ]] && echo "[math] stamp exists — skip" && exit 0

          GMP_VERSION=6.3.0
          MPFR_VERSION=4.2.1
          CGAL_VERSION=5.6.2
          DL=/tmp/math-dl
          mkdir -p "${DL}"

          # ── GMP ──────────────────────────────────────────────────────
          echo "[gmp] building GMP ${GMP_VERSION}…"
          # Use GNU FTP mirror (gmplib.org blocks GitHub Actions runners)
          curl -fL --retry 3 \
            "https://ftp.gnu.org/gnu/gmp/gmp-${GMP_VERSION}.tar.xz" | tar xJ -C "${DL}"
          cd "${DL}/gmp-${GMP_VERSION}"
          # CONFIG_SITE seeds cache vars before any check runs; export provides
          # the same value via direct env inheritance for all sub-configures.
          printf 'gmp_cv_asm_label_suffix=":"\n' > /tmp/gmp_site.sh
          export gmp_cv_asm_label_suffix=":"
          export CFLAGS="${EXTRA_CXX_FLAGS}"
          export CXXFLAGS="${EXTRA_CXX_FLAGS}"
          CONFIG_SITE=/tmp/gmp_site.sh emconfigure ./configure \
            --prefix="${INSTALL}" \
            --host=wasm32-unknown-emscripten \
            --disable-shared --enable-static --disable-assembly \
            --enable-cxx
          emmake make -j"$(nproc)"
          make install

          # ── MPFR ─────────────────────────────────────────────────────
          echo "[mpfr] building MPFR ${MPFR_VERSION}…"
          curl -fL --retry 3 \
            "https://ftp.gnu.org/gnu/mpfr/mpfr-${MPFR_VERSION}.tar.xz" | tar xJ -C "${DL}"
          cd "${DL}/mpfr-${MPFR_VERSION}"
          emconfigure ./configure \
            --prefix="${INSTALL}" --with-gmp="${INSTALL}" --disable-shared --enable-static
          emmake make -j"$(nproc)"
          make install
          unset CFLAGS CXXFLAGS

          # ── CGAL (header-only + cmake config) ────────────────────────
          echo "[cgal] installing CGAL ${CGAL_VERSION} cmake config…"
          curl -fL --retry 3 \
            "https://github.com/CGAL/cgal/releases/download/v${CGAL_VERSION}/CGAL-${CGAL_VERSION}.tar.xz" \
            | tar xJ -C "${DL}"
          cd "${DL}/CGAL-${CGAL_VERSION}"
          # CGAL is header-only; cmake just installs headers + CMake config files.
          # Use plain cmake (no emcmake) for the install step.
          cmake -S . -B /tmp/cgal-build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="${INSTALL}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DGMP_INCLUDE_DIR="${INSTALL}/include" \
            -DGMP_LIBRARIES="${INSTALL}/lib/libgmp.a" \
            -DMPFR_INCLUDE_DIR="${INSTALL}/include" \
            -DMPFR_LIBRARIES="${INSTALL}/lib/libmpfr.a"
          cmake --build /tmp/cgal-build --target install

          touch "${STAMP}"

      # ── Eigen3 / nlohmann / EXPAT / NLopt ────────────────────────────
      # Eigen3/nlohmann/cereal are header-only (no compiled objects, nothing
      # to fix). EXPAT and NLopt DO compile real objects statically linked
      # into the final slicer-mt.wasm and need -pthread for mt — same
      # --shared-memory ABI requirement as OCCT/GMP/MPFR above (see the GMP
      # step's comment for the full explanation).
      - name: Build WASM deps — Eigen3 / nlohmann / EXPAT / NLopt
        run: |
          source "$EMSDK/emsdk_env.sh"
          INSTALL="$(pwd)/orca-wasm/deps-install"
          # Stamp name is version-suffixed (like the OCCT step below) AND
          # variant-suffixed (new — EXPAT/NLopt's compiled objects now
          # differ by -pthread) so that bumping either invalidates it even
          # if the cache step above only fell back to an older cache via
          # restore-keys.
          STAMP="${INSTALL}/.headers_built_eigen5.0.1_nlohmann3.11.3_expat2.5.0_nlopt2.7.1_cereal1.3.2_${{ matrix.variant }}"
          [[ -f "${STAMP}" ]] && echo "[headers+expat+nlopt] cached" && exit 0

          # ── Eigen3 (header-only, install cmake config) ────────────────
          echo "[eigen3] installing…"
          curl -fL "https://gitlab.com/libeigen/eigen/-/archive/5.0.1/eigen-5.0.1.tar.gz" \
            | tar xz -C /tmp/
          cmake -S /tmp/eigen-5.0.1 -B /tmp/eigen-build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="${INSTALL}" \
            -DBUILD_TESTING=OFF
          cmake --build /tmp/eigen-build --target install

          # ── nlohmann/json (header-only, install cmake config) ─────────
          echo "[nlohmann] installing…"
          git clone --depth 1 --branch v3.11.3 \
            https://github.com/nlohmann/json.git /tmp/nlohmann
          cmake -S /tmp/nlohmann -B /tmp/nlohmann-build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="${INSTALL}" \
            -DJSON_BuildTests=OFF \
            -DJSON_Install=ON
          cmake --build /tmp/nlohmann-build --target install

          # ── EXPAT (XML parser — needed by libslic3r) ──────────────────
          echo "[expat] building…"
          curl -fL "https://github.com/libexpat/libexpat/releases/download/R_2_5_0/expat-2.5.0.tar.xz" \
            | tar xJ -C /tmp/
          emcmake cmake -S /tmp/expat-2.5.0 -B /tmp/expat-build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="${INSTALL}" \
            -DEXPAT_BUILD_TOOLS=OFF \
            -DEXPAT_BUILD_EXAMPLES=OFF \
            -DEXPAT_BUILD_TESTS=OFF \
            -DEXPAT_SHARED_LIBS=OFF \
            "-DCMAKE_C_FLAGS=${EXTRA_CXX_FLAGS}"
          emmake cmake --build /tmp/expat-build --target install

          # ── NLopt (optimizer — needed by libslic3r) ───────────────────
          echo "[nlopt] building…"
          curl -fL "https://github.com/stevengj/nlopt/archive/v2.7.1.tar.gz" \
            | tar xz -C /tmp/
          emcmake cmake -S /tmp/nlopt-2.7.1 -B /tmp/nlopt-build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="${INSTALL}" \
            -DNLOPT_CXX=ON \
            -DNLOPT_PYTHON=OFF \
            -DNLOPT_GUILE=OFF \
            -DNLOPT_MATLAB=OFF \
            -DNLOPT_OCTAVE=OFF \
            -DNLOPT_SWIG=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            "-DCMAKE_C_FLAGS=${EXTRA_CXX_FLAGS}" \
            "-DCMAKE_CXX_FLAGS=${EXTRA_CXX_FLAGS}"
          emmake cmake --build /tmp/nlopt-build --target install

          # ── cereal (header-only serialization — needed by libslic3r) ─────
          echo "[cereal] installing…"
          git clone --depth 1 --branch v1.3.2 \
            https://github.com/USCiLab/cereal.git /tmp/cereal
          cmake -S /tmp/cereal -B /tmp/cereal-build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="${INSTALL}" \
            -DJUST_INSTALL_CEREAL=ON \
            -DSKIP_PERFORMANCE_COMPARISON=ON \
            -DBUILD_SANDBOX=OFF \
            -DBUILD_DOC=OFF
          cmake --build /tmp/cereal-build --target install

          touch "${STAMP}"

      # ── libnoise ─────────────────────────────────────────────────────────
      # SoftFever's Orca-deps-libnoise fork — pure C++, no OS calls, compiles
      # cleanly with Emscripten. Provides noise::noise (Perlin/Billow/RidgedMulti/
      # Voronoi) consumed by libslic3r's FuzzySkin feature. Needs -pthread for
      # mt — same --shared-memory ABI requirement as OCCT/GMP/MPFR/EXPAT/
      # NLopt above (see the GMP step's comment for the full explanation).
      - name: Build WASM deps — libnoise
        run: |
          source "$EMSDK/emsdk_env.sh"
          INSTALL="$(pwd)/orca-wasm/deps-install"
          STAMP="${INSTALL}/.libnoise_built_${{ matrix.variant }}"
          [[ -f "${STAMP}" ]] && echo "[libnoise] stamp exists — skip" && exit 0

          echo "[libnoise] downloading Orca-deps-libnoise 1.0…"
          curl -fL --retry 3 \
            "https://github.com/SoftFever/Orca-deps-libnoise/archive/refs/tags/1.0.tar.gz" \
            | tar xz -C /tmp/
          mv /tmp/Orca-deps-libnoise-1.0 /tmp/libnoise-src

          echo "[libnoise] configuring with Emscripten…"
          emcmake cmake -S /tmp/libnoise-src -B /tmp/libnoise-build -G Ninja \
            -DCMAKE_INSTALL_PREFIX="${INSTALL}" \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_CXX_FLAGS=${EXTRA_CXX_FLAGS}"

          echo "[libnoise] building…"
          emmake cmake --build /tmp/libnoise-build --target install -j"$(nproc)"

          echo "[libnoise] verifying install…"
          ls "${INSTALL}/include/libnoise/noise.h" && echo "  headers OK"
          ls "${INSTALL}/lib/liblibnoise_static.a" && echo "  lib OK"
          touch "${STAMP}"

      # ── OCCT 7.8.1 (STEP / IGES CAD kernel) ─────────────────────────────────
      # Builds the minimal STEP+IGES+tessellation subset of OCCT for WASM.
      # ~30-60 min first build; subsequent runs skip via stamp file.
      - name: Build WASM deps — OCCT
        run: |
          source "$EMSDK/emsdk_env.sh"
          OCCT_VERSION="7.8.1"
          OCCT_TAG="V${OCCT_VERSION//./_}"
          INSTALL="$(pwd)/orca-wasm/deps-install"
          # _v2 suffix: manually bumped, not tied to OCCT_TAG — the -pthread
          # fix below changed OCCT's build *flags* for mt, not its pinned
          # version, so OCCT_TAG alone wouldn't invalidate a stale cached
          # (non-pthread) build already sitting in the mt deps-install
          # cache from before this fix (same gotcha as the Boost stamp
          # bump above — the cache key itself doesn't encode these flags).
          STAMP="${INSTALL}/.occt_built_${OCCT_TAG}_v2"
          [[ -f "${STAMP}" ]] && echo "[occt] stamp exists — skip" && exit 0

          echo "[occt] downloading OCCT ${OCCT_VERSION}…"
          mkdir -p /tmp/occt/occt-src
          curl -fL --retry 3 \
            "https://github.com/Open-Cascade-SAS/OCCT/archive/refs/tags/${OCCT_TAG}.tar.gz" \
            | tar xz -C /tmp/occt/occt-src --strip-components=1

          echo "[occt] excluding ExpToCasExe host tool…"
          # ExpToCasExe is a developer-only code generator (regenerates STEP
          # EXPRESS schema sources, which OCCT already ships pre-generated).
          # Under Emscripten its versioned executable output (ExpToCasExe.js-7.8.1)
          # breaks OCCT's install rule, which looks for "ExpToCasExe.wasm".
          # We don't need it, so drop it from BUILD_TOOLKITS before configure.
          python3 - <<'PYEOF'
          import pathlib
          p = pathlib.Path('/tmp/occt/occt-src/CMakeLists.txt')
          t = p.read_text()
          anchor = 'set (BUILD_TOOLKITS ${RAW_BUILD_TOOLKITS})'
          assert anchor in t, 'OCCT BUILD_TOOLKITS anchor not found — OCCT layout changed'
          p.write_text(t.replace(anchor, anchor + '\nlist (REMOVE_ITEM BUILD_TOOLKITS ExpToCasExe)', 1))
          print('[occt-patch] excluded ExpToCasExe from BUILD_TOOLKITS')
          PYEOF

          echo "[occt] configuring with Emscripten…"
          # OCCT ignores the standard BUILD_SHARED_LIBS flag — it selects the
          # library type from its own BUILD_LIBRARY_TYPE cache variable, which
          # defaults to "Shared" and then force-sets BUILD_SHARED_LIBS=ON
          # (CMakeLists.txt:55, with no platform guard).  Emscripten cannot
          # resolve transitive .so dependencies from outside its sysroot, so the
          # link of OCCT's ExpToCasExe host tool fails with
          # "libTKExpress.so: dependency not found: libTKernel.so".
          # Setting BUILD_LIBRARY_TYPE=Static makes OCCT emit .a archives, which
          # is the only flag that actually controls this.  The toolchain file is
          # used directly (not emcmake) for explicit CMAKE_SYSTEM_NAME=Emscripten,
          # and CMAKE_CROSSCOMPILING_EMULATOR=node lets cmake run any in-build
          # codegen tools via Node.
          #
          # mt needs -pthread here too — this is a wholly separate cmake
          # invocation from "Configure WASM build" below (its own toolchain
          # file, not emcmake), so it never inherited that step's
          # EXTRA_CXX_FLAGS. Missing this is exactly what caused a real link
          # failure: OCCT's own -fexceptions runtime glue ("exceptions.o")
          # got compiled without atomics/bulk-memory support and then linked
          # into the final --shared-memory binary, even though the
          # variant-suffixed Emscripten cache (a different, already-fixed
          # bug) ruled out a stale-cache explanation — confirmed via
          # "Install Emscripten" actually running (not cache-hit-skipped) on
          # the run that still failed this way.
          cmake \
            -S /tmp/occt/occt-src \
            -B /tmp/occt/build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${EMSDK}/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${INSTALL}" \
            -DBUILD_LIBRARY_TYPE=Static \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_CROSSCOMPILING_EMULATOR="node" \
            -DBUILD_MODULE_Draw=OFF \
            -DBUILD_MODULE_Visualization=OFF \
            -DBUILD_MODULE_FoundationClasses=ON \
            -DBUILD_MODULE_ModelingData=ON \
            -DBUILD_MODULE_ModelingAlgorithms=ON \
            -DBUILD_MODULE_DataExchange=ON \
            -DBUILD_MODULE_ApplicationFramework=ON \
            -DUSE_FREETYPE=OFF \
            -DUSE_OPENGL2=OFF \
            -DUSE_TCL=OFF \
            -DUSE_TK=OFF \
            -DUSE_FFMPEG=OFF \
            -DUSE_FREEIMAGE=OFF \
            -DUSE_RAPIDJSON=OFF \
            -DUSE_DRACO=OFF \
            -DUSE_VTK=OFF \
            -DUSE_TBB=OFF \
            "-DCMAKE_CXX_FLAGS=-O2 -fexceptions -Wno-deprecated-anon-enum-enum-conversion -Wno-unknown-warning-option ${EXTRA_CXX_FLAGS}" \
            "-DCMAKE_C_FLAGS=-O2 ${EXTRA_CXX_FLAGS}"

          echo "[occt] building (first run ~30–60 min)…"
          cmake --build /tmp/occt/build -j"$(nproc)"

          echo "[occt] installing to ${INSTALL}…"
          cmake --install /tmp/occt/build

          echo "[occt] verifying install…"
          ls "${INSTALL}/lib/cmake/opencascade/OpenCASCADEConfig.cmake" \
            && echo "  cmake config OK"
          ls "${INSTALL}/lib/libTKernel.a" && echo "  TKernel.a OK"
          touch "${STAMP}"

      # ── Emscripten ports — ZLIB / libpng / libjpeg (mt only) ─────────────
      # libpng.py already supports a pthread-aware "libpng-mt" variant
      # (checks settings.PTHREADS, adds -pthread, caches under a distinct
      # filename), selectable by requesting that exact target name via
      # embuilder — confirmed by reading tools/ports/libpng.py directly.
      # zlib.py and libjpeg.py have no such variants dict at all: building
      # `zlib`/`libjpeg` always produces the same non-pthread object code
      # regardless of any ambient flag, and there is no "-mt" target to
      # request instead. An EMCC_CFLAGS-based attempt at this (tried first,
      # before finding this out) silently did nothing: Emscripten's own
      # system_libs.clean_env() *deliberately deletes* EMCC_CFLAGS before
      # every port/system-library compile, specifically so ports build
      # hermetically regardless of what the user has set — confirmed by
      # reading tools/system_libs.py directly. So for mt, patch zlib.py/
      # libjpeg.py in place to add the identical pattern libpng.py already
      # uses (mirrored exactly, verified locally against this repo's
      # pinned Emscripten 3.1.74 — `embuilder --help` lists zlib-mt/
      # libjpeg-mt as valid targets once patched), rather than vendoring
      # these from a different source and risking subtle divergence from
      # what the st build already ships.
      - name: Patch Emscripten zlib/libjpeg ports for pthread (mt)
        if: matrix.variant == 'mt'
        run: |
          source "$EMSDK/emsdk_env.sh"
          python3 - <<'PYEOF'
          import os
          import pathlib

          # Read EMSDK from the environment rather than interpolating it into
          # this heredoc — the heredoc delimiter is quoted ('PYEOF') so bash
          # performs no variable substitution inside it at all.
          emsdk = os.environ["EMSDK"]
          zlib_py = pathlib.Path(emsdk, "upstream/emscripten/tools/ports/zlib.py")
          t = zlib_py.read_text()
          # The "Cache Emscripten" step above caches the whole $EMSDK tree,
          # including this file's own patched state from a previous run —
          # so a cache hit restores an already-patched zlib.py, and this
          # script must tolerate re-running against it instead of asserting.
          if "variants = {'zlib-mt'" in t:
            print("[zlib-patch] already patched (cached emsdk) — skipping")
          else:
            anchor = (
                "def needed(settings):\n"
                "  return settings.USE_ZLIB\n"
                "\n\n"
                "def get(ports, settings, shared):"
            )
            assert anchor in t, "zlib.py layout changed — pthread patch anchor not found"
            t = t.replace(anchor, (
                "variants = {'zlib-mt': {'PTHREADS': 1}}\n\n\n"
                "def needed(settings):\n"
                "  return settings.USE_ZLIB\n"
                "\n\n"
                "def get_lib_name(settings):\n"
                "  return 'libz-mt.a' if settings.PTHREADS else 'libz.a'\n"
                "\n\n"
                "def get(ports, settings, shared):"
            ), 1)
            anchor2 = (
                "    flags = ['-Wno-deprecated-non-prototype']\n"
                "    ports.build_port(source_path, final, 'zlib', srcs=srcs, flags=flags)\n"
                "\n"
                "  return [shared.cache.get_lib('libz.a', create, what='port')]"
            )
            assert anchor2 in t, "zlib.py build block changed — pthread patch anchor not found"
            t = t.replace(anchor2, (
                "    flags = ['-Wno-deprecated-non-prototype']\n"
                "    if settings.PTHREADS:\n"
                "      flags += ['-pthread']\n"
                "    ports.build_port(source_path, final, 'zlib', srcs=srcs, flags=flags)\n"
                "\n"
                "  return [shared.cache.get_lib(get_lib_name(settings), create, what='port')]"
            ), 1)
            zlib_py.write_text(t)
            print("[zlib-patch] added pthread-aware zlib-mt variant")

          libjpeg_py = pathlib.Path(emsdk, "upstream/emscripten/tools/ports/libjpeg.py")
          t = libjpeg_py.read_text()
          if "variants = {'libjpeg-mt'" in t:
            print("[libjpeg-patch] already patched (cached emsdk) — skipping")
          else:
            anchor = (
                "def needed(settings):\n"
                "  return settings.USE_LIBJPEG\n"
                "\n\n"
                "def get(ports, settings, shared):"
            )
            assert anchor in t, "libjpeg.py layout changed — pthread patch anchor not found"
            t = t.replace(anchor, (
                "variants = {'libjpeg-mt': {'PTHREADS': 1}}\n\n\n"
                "def needed(settings):\n"
                "  return settings.USE_LIBJPEG\n"
                "\n\n"
                "def get_lib_name(settings):\n"
                "  return 'libjpeg-mt.a' if settings.PTHREADS else 'libjpeg.a'\n"
                "\n\n"
                "def get(ports, settings, shared):"
            ), 1)
            anchor2 = (
                "    ports.build_port(source_path, final, 'libjpeg', exclude_files=excludes)\n"
                "\n"
                "  return [shared.cache.get_lib('libjpeg.a', create, what='port')]"
            )
            assert anchor2 in t, "libjpeg.py build block changed — pthread patch anchor not found"
            t = t.replace(anchor2, (
                "    flags = []\n"
                "    if settings.PTHREADS:\n"
                "      flags += ['-pthread']\n"
                "    ports.build_port(source_path, final, 'libjpeg', exclude_files=excludes, flags=flags)\n"
                "\n"
                "  return [shared.cache.get_lib(get_lib_name(settings), create, what='port')]"
            ), 1)
            libjpeg_py.write_text(t)
            print("[libjpeg-patch] added pthread-aware libjpeg-mt variant")
          PYEOF

      # ── Emscripten ports — ZLIB / libpng / libjpeg ───────────────────────
      # Build emscripten's bundled ports so FindZLIB/FindPNG/FindJPEG can
      # reference their headers and .a files from the sysroot.
      #
      # No stamp short-circuit here: these ports live in the emsdk sysroot
      # ($EMSDK/.../cache/sysroot), not in the cached deps-install/.  The
      # sysroot is now carried by the "Cache Emscripten" step above, so on a
      # cache hit embuilder finds the ports already built and is a no-op
      # (a few seconds); on a cold emsdk cache it builds them.  Always run it —
      # embuilder is idempotent and self-caching.
      #
      # mt requests the -mt-suffixed targets (patched in above) so the
      # actual compiled objects carry atomics/bulk-memory support — every
      # object linked into a --shared-memory binary needs this regardless
      # of whether its own code touches threads (see the OCCT step's
      # comment for the full explanation; this exact gap broke the link
      # with "wasm-ld: --shared-memory is disallowed by pngerror.c.o").
      # Then copied over the plain (non-"-mt") filenames too: OCCT's
      # find_package(PNG)/find_package(JPEG)/find_package(ZLIB) look for
      # the standard names, not "-mt" ones, so downstream consumers still
      # find them under the path they already expect — same bytes, just
      # also reachable under both names.
      - name: Build WASM deps — emscripten ports (zlib/png/jpeg)
        run: |
          source "$EMSDK/emsdk_env.sh"
          SYSROOT_LIB="$EMSDK/upstream/emscripten/cache/sysroot/lib/wasm32-emscripten"
          if [[ "${{ matrix.variant }}" == "mt" ]]; then
            echo "[emports] building zlib-mt, libpng-mt, libjpeg-mt via embuilder…"
            embuilder build zlib-mt libpng-mt libjpeg-mt
            cp "${SYSROOT_LIB}/libz-mt.a" "${SYSROOT_LIB}/libz.a"
            cp "${SYSROOT_LIB}/libpng-mt.a" "${SYSROOT_LIB}/libpng.a"
            cp "${SYSROOT_LIB}/libjpeg-mt.a" "${SYSROOT_LIB}/libjpeg.a"
          else
            echo "[emports] building zlib, libpng, libjpeg via embuilder…"
            embuilder build zlib libpng libjpeg
          fi
          echo "[emports] sysroot libs:"
          ls "${SYSROOT_LIB}/libz.a" && echo "  libz OK"
          ls "${SYSROOT_LIB}/libpng.a" && echo "  libpng OK"
          ls "${SYSROOT_LIB}/libjpeg.a" && echo "  libjpeg OK"

      - name: Build official oneTBB for WASM (mt)
        if: matrix.variant == 'mt'
        run: |
          source "$EMSDK/emsdk_env.sh"
          INSTALL="$(pwd)/orca-wasm/deps-install"
          STAMP="${INSTALL}/.onetbb_${ONETBB_VERSION}"
          [[ -f "${STAMP}" ]] && echo "[oneTBB] cached" && exit 0

          git clone --depth 1 --branch "${ONETBB_VERSION}" \
            https://github.com/uxlfoundation/oneTBB.git /tmp/onetbb
          emcmake cmake -S /tmp/onetbb -B /tmp/onetbb-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${INSTALL}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DTBB_TEST=OFF \
            -DTBB_EXAMPLES=OFF \
            -DTBB_STRICT=OFF \
            -DTBB_DISABLE_HWLOC_AUTOMATIC_SEARCH=ON
          cmake --build /tmp/onetbb-build --target install -j"$(nproc)"
          test -f "${INSTALL}/lib/libtbb.a"
          test -f "${INSTALL}/lib/cmake/TBB/TBBConfig.cmake"
          touch "${STAMP}"

      - name: Save completed dependency cache
        if: steps.dep-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: orca-wasm/deps-install
          key: wasm-deps-${{ runner.os }}-${{ matrix.variant }}-orca-${{ env.ORCA_VERSION }}-occt-${{ env.OCCT_VERSION }}-onetbb-${{ env.ONETBB_VERSION }}-v17

      # ── Configure WASM build ─────────────────────────────────────────
      # Builds from OrcaSlicer's own root cmake (with our patches applied).
      # All deps are in deps-install/ via CMAKE_PREFIX_PATH.
      - name: Configure WASM build
        run: |
          source "$EMSDK/emsdk_env.sh"
          WORK="$(pwd)"
          DEP_INSTALL="${WORK}/orca-wasm/deps-install"
          mkdir -p orca-wasm/build-wasm

          # mt adds -pthread at compile time for the whole tree (libslic3r,
          # bridge, and the final slicer target all need pthread-consistent
          # object code — see ADR-011) and switches the TBB
          # include dir (real oneTBB headers instead of the ST shims) +
          # SLIC3R_WASM_MT compile define (see orca-wasm/bridge/CMakeLists.txt)
          # so the one threading-aware bridge line flips.
          COMMON_SHIM_DIR="${WORK}/orca-wasm/wasm/shims-common"
          TBB_INCLUDE_DIR="${WORK}/orca-wasm/wasm/shims"
          if [[ "${{ matrix.variant }}" == "mt" ]]; then
            TBB_INCLUDE_DIR="${DEP_INSTALL}/include"
          fi

          emcmake cmake \
            -S orca-wasm/orca \
            -B orca-wasm/build-wasm \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${DEP_INSTALL}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_MODULE_PATH="${WORK}/orca-wasm/cmake" \
            -DCMAKE_PROJECT_INCLUDE_BEFORE="${WORK}/orca-wasm/cmake/wasm_find_paths.cmake" \
            -DSLIC3R_WASM=ON \
            -DSLIC3R_WASM_MT=${{ env.SLIC3R_WASM_MT }} \
            -DSLIC3R_GUI=OFF \
            -DSLIC3R_STATIC=ON \
            -DSLIC3R_OPENCASCADE=ON \
            -DOCCT_WASM_DIR="${DEP_INSTALL}" \
            -DSLIC3R_OPENGL_IMGUI=OFF \
            -DTBB_SHIM_DIR="${TBB_INCLUDE_DIR}" \
            -DORCA_WEB_BRIDGE_DIR="${WORK}/orca-wasm/bridge" \
            -DORCA_WEB_WASM_DIR="${WORK}/orca-wasm/wasm" \
            -DORCA_WEB_SHIM_DIR="${TBB_INCLUDE_DIR}" \
            -DORCA_WEB_OVERRIDES_DIR="${WORK}/orca-wasm/overrides" \
            -DORCA_WEB_WASM_OUTPUT_NAME="${OUTPUT_NAME}" \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBOOST_ROOT="${DEP_INSTALL}" \
            -DBoost_ROOT="${DEP_INSTALL}" \
            -DCGAL_DIR="${DEP_INSTALL}/lib/cmake/CGAL" \
            -DNLOPT_LIBRARY="${DEP_INSTALL}/lib/libnlopt.a" \
            -DNLOPT_INCLUDE_DIR="${DEP_INSTALL}/include" \
            "-DCMAKE_CXX_FLAGS=-I${COMMON_SHIM_DIR} -I${TBB_INCLUDE_DIR} -fexceptions -DBOOST_HAS_PTHREADS=1 -DSLIC3R_WASM=1 -DSLIC3R_NO_OPENVDB=1 -DSLIC3R_NO_OPENCV=1 ${EXTRA_CXX_FLAGS}" \
            "-DCMAKE_C_FLAGS=-I${COMMON_SHIM_DIR} -I${TBB_INCLUDE_DIR} ${EXTRA_CXX_FLAGS}"

      # ── Build WASM module ────────────────────────────────────────────
      - name: Build WASM module
        run: |
          source "$EMSDK/emsdk_env.sh"
          emmake cmake --build orca-wasm/build-wasm --target slicer -j4
          echo "--- ccache stats ---"
          ccache -s || true

      # ── Verify & package artifacts ───────────────────────────────────
      # wasm/CMakeLists.txt POST_BUILD copies to public/wasm/ automatically.
      - name: Package WASM artifacts
        run: |
          echo "--- build output ---"
          ls -lh orca-wasm/build-wasm/wasm/ 2>/dev/null || ls -lh orca-wasm/build-wasm/ || true
          echo "--- public/wasm/ ---"
          ls -lh public/wasm/ 2>/dev/null || true

          # Fallback copy if POST_BUILD didn't run.  ${OUTPUT_NAME}.data only
          # exists when a --preload-file bundle is used; the v2.4.2 engine
          # has none, so it is copied only if present.
          BUILDDIR="orca-wasm/build-wasm/wasm"
          if [[ ! -f "public/wasm/${OUTPUT_NAME}.js" ]] && [[ -f "${BUILDDIR}/${OUTPUT_NAME}.js" ]]; then
            mkdir -p public/wasm
            cp "${BUILDDIR}/${OUTPUT_NAME}.js"   "public/wasm/${OUTPUT_NAME}.js"
            cp "${BUILDDIR}/${OUTPUT_NAME}.wasm" "public/wasm/${OUTPUT_NAME}.wasm"
            [[ -f "${BUILDDIR}/${OUTPUT_NAME}.data" ]] && cp "${BUILDDIR}/${OUTPUT_NAME}.data" "public/wasm/${OUTPUT_NAME}.data"
          fi

          mkdir -p wasm-artifacts
          cp "public/wasm/${OUTPUT_NAME}.js"   wasm-artifacts/
          cp "public/wasm/${OUTPUT_NAME}.wasm" wasm-artifacts/
          [[ -f "public/wasm/${OUTPUT_NAME}.data" ]] && cp "public/wasm/${OUTPUT_NAME}.data" wasm-artifacts/
          ls -lh wasm-artifacts/

      # ── Smoke test ────────────────────────────────────────────────────
      # A build can compile cleanly and still be functionally broken (the
      # Voron Cube wall-generator crash and the boost::log/nozzle_info.json
      # crash both slipped through compile-only checks in the past — see
      # orca-wasm/bridge/slicer.cpp's ensure_nozzle_info_json() comment and
      # wasm/CMakeLists.txt's --profiling-funcs comment). Actually slice
      # something with the freshly built engine before trusting it enough to
      # publish a release or upload it as an artifact anyone might use.
      # Runs before both "Upload artifacts" and the release step below so a
      # broken engine never reaches either.
      - name: Smoke test WASM module
        run: node orca-wasm/scripts/smoke-test.mjs --wasm-dir public/wasm --engine "${OUTPUT_NAME}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: orca-wasm-${{ env.ORCA_VERSION }}-${{ matrix.variant }}
          path: wasm-artifacts/
          retention-days: 90

      # ── Create a new, immutable GitHub release with WASM assets ──────
      # Skip on PRs — those runs only validate compilation, not publish.
      # Releases are never overwritten in place (no --clobber on create):
      # the first build for a given OrcaSlicer version publishes
      # "wasm-$ORCA_VERSION"; every subsequent build for the SAME
      # ORCA_VERSION (a fix to our patches/bridge, not an upstream bump)
      # publishes "wasm-$ORCA_VERSION-patchN" as a brand-new release, so a
      # tag always points at exactly the artifacts it was created with —
      # deploy.yml resolves the latest one at deploy time (see its
      # "Resolve latest WASM release" step) rather than assuming a fixed tag.
      #
      # The mt variant publishes to the SAME tag with a "-multithreaded"
      # suffix, sharing one patch counter with st (both matrix legs derive
      # the same next-patch number independently from the same st-tag-family
      # scan — see ADR-011 — so "wasm-v2.4.0-patch5" and
      # "wasm-v2.4.0-patch5-multithreaded" always describe the same source
      # commit, just two build variants of it). This mirrors the pattern
      # already proven out in poc/wasm-threads/'s
      # build-wasm-threads-poc.yml, now applied to the real engine.
      - name: Upload to GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_TAG="wasm-$ORCA_VERSION"
          if gh release view "$BASE_TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            # Require a purely numeric "-patchN" suffix — startswith() alone
            # also matches unrelated releases like "-patch2-multithreaded"
            # from other in-flight work, whose non-numeric suffix would crash
            # tonumber (see the matching fix in deploy.yml's WASM_TAG lookup).
            LATEST_PATCH=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq "
              [.[] | .tagName | select(startswith(\"${BASE_TAG}-patch\") and (split(\"-patch\")[1] | test(\"^[0-9]+\$\"))) | split(\"-patch\")[1] | tonumber]
              | max // 0
            ")
            NEXT_PATCH=$((LATEST_PATCH + 1))
          else
            NEXT_PATCH=0
          fi
          # ── Release notes with a changelog since the previous release ──
          # The previous release is the newest existing wasm-v* release
          # overall, not just within $BASE_TAG's family: the first build of
          # a new upstream version should still describe what changed since
          # the last published engine. `gh release list` sorts newest-first.
          # Matched as "wasm-v" (not just "wasm-") to exclude sibling release
          # families like wasm-poc-* (see build-wasm-threads-poc.yml) that
          # would otherwise be picked up as a bogus "previous engine release",
          # and excludes "-multithreaded" so the mt leg's changelog is
          # computed against the previous mt release, not the st one.
          PREV_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName \
            --jq "[.[] | .tagName | select(startswith(\"wasm-v\")) | select(endswith(\"-multithreaded\") == $( [[ "${{ matrix.variant }}" == "mt" ]] && echo true || echo false ))] | first // empty")
          # Real newlines via a notes file — the previous inline
          # --notes "...\n\n..." passed the backslash-n sequences literally,
          # so published notes showed a verbatim "\n\n" instead of a blank line.
          cat > release-notes.md <<EOF
          Pre-built WASM artifacts for OrcaSlicer $ORCA_VERSION ($( [[ "${{ matrix.variant }}" == "mt" ]] && echo "multithreaded — requires COOP/COEP headers, see ADR-011" || echo "single-threaded" )).

          Used internally by the deploy workflow. Immutable — a fix to orca-wasm/ publishes a new *-patchN release rather than overwriting this one.
          EOF
          if [ -n "$PREV_TAG" ]; then
            # Fetch the tag explicitly rather than trusting checkout to have
            # brought it down — deploy.yml got burned once by assuming
            # fetch-depth: 0 implies tags are present (see its ls-remote
            # comment). If the fetch fails anyway, skip the section rather
            # than mislabel the release as a no-change rebuild.
            if git fetch --quiet origin "refs/tags/${PREV_TAG}:refs/tags/${PREV_TAG}"; then
              # Path filter matches this workflow's own push triggers, so the
              # list shows engine/pipeline changes only — no UI PRs, no
              # auto-bump commits. Master is squash-merged, so subjects are PR
              # titles whose (#NN) references GitHub auto-links in the body.
              CHANGELOG=$(git log --format='- %s' "${PREV_TAG}..HEAD" -- orca-wasm/ .github/workflows/build-wasm.yml)
              {
                echo ""
                echo "## Changes since ${PREV_TAG}"
                echo ""
                if [ -n "$CHANGELOG" ]; then
                  echo "$CHANGELOG"
                else
                  echo "No engine changes since ${PREV_TAG} (rebuild)."
                fi
              } >> release-notes.md
            else
              echo "::warning::Could not fetch tag ${PREV_TAG} — publishing without a changelog section"
            fi
          fi
          echo "── release-notes.md ──"
          cat release-notes.md

          # Deleting a release does not delete its underlying git tag, and
          # GitHub refuses to reuse a tag_name that was ever used by an
          # immutable release — `gh release create` fails with "tag_name was
          # used by an immutable release" even though `gh release list` no
          # longer shows it. Retry with the next patch number when that (or a
          # same-number race from a concurrent build) happens, instead of
          # failing a multi-hour build outright.
          for i in $(seq 0 20); do
            PATCH=$((NEXT_PATCH + i))
            if [ "$PATCH" -eq 0 ]; then
              TAG="$BASE_TAG"
            else
              TAG="${BASE_TAG}-patch${PATCH}"
            fi
            if [[ "${{ matrix.variant }}" == "mt" ]]; then
              TAG="${TAG}-multithreaded"
            fi
            echo "Attempting to publish release: $TAG"
            # Attach assets in the same `gh release create` call rather than a
            # separate `gh release upload` afterward: GitHub now marks a
            # release immutable as soon as it's created, so a later upload
            # call fails with "HTTP 422: Cannot upload assets to an immutable
            # release." Passing the files as trailing args uploads them
            # atomically as part of creation, before that immutability applies.
            if OUTPUT=$(gh release create "$TAG" wasm-artifacts/* \
                --title "WASM build for OrcaSlicer $ORCA_VERSION ($TAG)" \
                --notes-file release-notes.md \
                --repo "$GITHUB_REPOSITORY" 2>&1); then
              echo "$OUTPUT"
              echo "Published: $TAG"
              exit 0
            fi
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -qi "used by an immutable release\|already_exists\|already exists"; then
              echo "Tag $TAG unavailable, trying next patch number..."
              continue
            fi
            echo "::error::gh release create failed for a reason other than a tag collision"
            exit 1
          done
          echo "::error::Exhausted patch-number retries without finding a free tag"
          exit 1

  # ── Phase 4 correctness check — st vs. mt must slice identically ────────
  # A separate job (not a step inside `build`) because it needs BOTH matrix
  # legs' output at once; `needs: build` waits for every `build` matrix
  # combination, so this only runs once both variants have actually built
  # (and is skipped entirely if either failed — there's nothing meaningful
  # to compare against a broken build). Uses actions/download-artifact
  # against this SAME run's own artifacts (uploaded by "Upload artifacts"
  # above, unconditionally — unlike "Upload to GitHub Release", which is
  # skipped on PRs), so this runs on every trigger including PR validation,
  # with no dependency on a published release existing yet.
  #
  # This exists because compare-st-mt.mjs could not be run from outside CI
  # in the session that first got build (mt) green: downloading workflow
  # artifacts requires following actions_get's download_workflow_run_artifact
  # URL, which points at Azure Blob Storage — not reachable through that
  # sandbox's egress allowlist (confirmed via a real attempt, a 403 CONNECT
  # rejection logged by the proxy, not assumed). Running the comparison here
  # sidesteps that entirely: both artifacts already sit on the runner's own
  # disk, no external fetch needed.
  compare-outputs:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ORCA_VERSION: ${{ github.event.inputs.orca_version || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || 'v2.4.2' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      # Both downloads target public/wasm/, not some fresh scratch directory
      # — st ships slicer.js/.wasm, mt ships slicer-mt.js/.wasm, so the
      # filenames never collide, and public/wasm/package.json ({"type":
      # "commonjs"}, committed — see its own comment) is already there to
      # override the repo root's "type": "module" for whichever directory
      # compare-st-mt.mjs loads the engines from. A fresh directory here
      # (the original "wasm-compare" this job shipped with) has no such
      # override, so Node parses Emscripten's CommonJS output as ESM and
      # its unconditional `require('worker_threads')` throws — the exact
      # ERR_WORKER_PATH-adjacent bug already fixed once for smoke-test.mjs,
      # just hit again here because this job downloads into a directory
      # that never got the same override.
      - name: Download st artifact
        uses: actions/download-artifact@v8
        with:
          name: orca-wasm-${{ env.ORCA_VERSION }}-st
          path: public/wasm

      - name: Download mt artifact
        uses: actions/download-artifact@v8
        with:
          name: orca-wasm-${{ env.ORCA_VERSION }}-mt
          path: public/wasm

      - name: Run st vs. mt G-code comparison
        run: node orca-wasm/scripts/compare-st-mt.mjs --wasm-dir public/wasm
