name: Build WASM (UBSan diagnostic)

# TEMPORARY diagnostic workflow — NOT part of the normal release pipeline.
# Manual-only. Builds the WASM engine with -fsanitize=undefined on the main
# slicer/bridge compile (dependency builds — Boost/OCCT/etc. — are reused
# from build-wasm.yml's own cache unmodified, since the bug under
# investigation lives in our own libslic3r/Arachne code, not a dependency)
# and runs the smoke test against the real Voron Design Cube v7 fixture
# (e2e/fixtures/voron-design-cube-v7.stl), which reproducibly triggers
# undefined behavior in the Arachne wall generator (crash or multi-minute
# hang, non-deterministically — see mkdocs-docs/adr/adr-009-wasm-smoke-test.md
# and the investigation in PR history). UBSan intercepts the exact UB at the
# moment it happens, regardless of which symptom it would otherwise cause,
# giving a precise file:line — the same method used to find patches
# 8/8c/8d/8e/8f in orca-wasm/patches/apply.py.
#
# Never publishes a release. Safe to delete once the bug is found and fixed.
on:
  workflow_dispatch:
    inputs:
      orca_version:
        description: 'OrcaSlicer tag to build (e.g. v2.4.0)'
        default: 'v2.4.0'
        required: true

concurrency:
  group: build-wasm-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    env:
      ORCA_VERSION: ${{ github.event.inputs.orca_version || 'v2.4.0' }}
      OCCT_VERSION: "7.8.1"
      EMSDK_VERSION: "3.1.74"
      EMSDK: /opt/emsdk

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache Emscripten
        id: cache-emsdk
        uses: actions/cache@v6
        with:
          path: /opt/emsdk
          key: emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}-v1

      - name: Install Emscripten
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git /opt/emsdk
          /opt/emsdk/emsdk install "$EMSDK_VERSION"
          /opt/emsdk/emsdk activate "$EMSDK_VERSION"

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ninja-build python3 cmake pkg-config \
            m4 texinfo libssl-dev ccache

      # Distinct cache key from build-wasm.yml's — sanitizer flags change the
      # compile command line, so ccache would miss on every object anyway;
      # keeping it separate avoids evicting the production build's cache.
      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ccache
          key: wasm-ccache-debug-${{ runner.os }}-orca-${{ env.ORCA_VERSION }}-${{ github.run_id }}
          restore-keys: |
            wasm-ccache-debug-${{ runner.os }}-orca-${{ env.ORCA_VERSION }}-
            wasm-ccache-debug-${{ runner.os }}-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          echo "CCACHE_DIR=$HOME/.cache/ccache" >> "$GITHUB_ENV"

      - name: Checkout OrcaSlicer ${{ env.ORCA_VERSION }}
        run: |
          git clone --depth 1 --branch "$ORCA_VERSION" \
            https://github.com/SoftFever/OrcaSlicer.git \
            orca-wasm/orca

      - name: Patch OrcaSlicer source
        run: python3 orca-wasm/patches/apply.py

      # Same cache as build-wasm.yml — deps are unaffected by the sanitizer
      # flags added below (those apply only to the main slicer/bridge compile
      # step further down), so this reuses the production build's ~3h of
      # cached Boost/OCCT/CGAL/etc. work instead of rebuilding it.
      - name: Restore dep cache
        uses: actions/cache@v6
        with:
          path: orca-wasm/deps-install
          key: wasm-deps-${{ runner.os }}-orca-${{ env.ORCA_VERSION }}-occt-${{ env.OCCT_VERSION }}-v16
          restore-keys: |
            wasm-deps-${{ runner.os }}-orca-${{ env.ORCA_VERSION }}-occt-${{ env.OCCT_VERSION }}-
            wasm-deps-${{ runner.os }}-orca-${{ env.ORCA_VERSION }}-
            wasm-deps-${{ runner.os }}-

      - name: Verify dep cache hit (deps must be pre-built already)
        run: |
          if [[ ! -f orca-wasm/deps-install/lib/libboost_system.a ]] && [[ ! -f orca-wasm/deps-install/lib/libboost_system-mt.a ]]; then
            echo "::error::Dep cache miss — run/warm build-wasm.yml first so this diagnostic build doesn't also pay the ~3h dep build cost."
            exit 1
          fi
          echo "Dep cache present, continuing."

      - name: Configure WASM build (UBSan on main slicer compile)
        run: |
          source /opt/emsdk/emsdk_env.sh
          WORK="$(pwd)"
          DEP_INSTALL="${WORK}/orca-wasm/deps-install"
          mkdir -p orca-wasm/build-wasm

          emcmake cmake \
            -S orca-wasm/orca \
            -B orca-wasm/build-wasm \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="${DEP_INSTALL}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_MODULE_PATH="${WORK}/orca-wasm/cmake" \
            -DCMAKE_PROJECT_INCLUDE_BEFORE="${WORK}/orca-wasm/cmake/wasm_find_paths.cmake" \
            -DSLIC3R_WASM=ON \
            -DSLIC3R_GUI=OFF \
            -DSLIC3R_STATIC=ON \
            -DSLIC3R_OPENCASCADE=ON \
            -DOCCT_WASM_DIR="${DEP_INSTALL}" \
            -DSLIC3R_OPENGL_IMGUI=OFF \
            -DTBB_SHIM_DIR="${WORK}/orca-wasm/wasm/shims" \
            -DORCA_WEB_BRIDGE_DIR="${WORK}/orca-wasm/bridge" \
            -DORCA_WEB_WASM_DIR="${WORK}/orca-wasm/wasm" \
            -DORCA_WEB_SHIM_DIR="${WORK}/orca-wasm/wasm/shims" \
            -DORCA_WEB_OVERRIDES_DIR="${WORK}/orca-wasm/overrides" \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBOOST_ROOT="${DEP_INSTALL}" \
            -DBoost_ROOT="${DEP_INSTALL}" \
            -DCGAL_DIR="${DEP_INSTALL}/lib/cmake/CGAL" \
            -DNLOPT_LIBRARY="${DEP_INSTALL}/lib/libnlopt.a" \
            -DNLOPT_INCLUDE_DIR="${DEP_INSTALL}/include" \
            "-DCMAKE_CXX_FLAGS=-I${WORK}/orca-wasm/wasm/shims -fexceptions -DBOOST_HAS_PTHREADS=1 -DBOOST_LOG_NO_THREADS=1 -DSLIC3R_WASM=1 -DSLIC3R_NO_OPENVDB=1 -DSLIC3R_NO_OPENCV=1 -fsanitize=undefined -fno-sanitize-recover=undefined -g" \
            "-DCMAKE_C_FLAGS=-I${WORK}/orca-wasm/wasm/shims -fsanitize=undefined -fno-sanitize-recover=undefined -g" \
            "-DCMAKE_EXE_LINKER_FLAGS=-fsanitize=undefined -sASSERTIONS=1" \
            "-DCMAKE_SHARED_LINKER_FLAGS=-fsanitize=undefined"

      - name: Build WASM module (UBSan instrumented)
        run: |
          source /opt/emsdk/emsdk_env.sh
          emmake cmake --build orca-wasm/build-wasm --target slicer -j4
          echo "--- ccache stats ---"
          ccache -s || true

      - name: Package WASM artifacts
        run: |
          BUILDDIR="orca-wasm/build-wasm/wasm"
          mkdir -p public/wasm
          if [[ ! -f public/wasm/slicer.js ]] && [[ -f "${BUILDDIR}/slicer.js" ]]; then
            cp "${BUILDDIR}/slicer.js"   public/wasm/slicer.js
            cp "${BUILDDIR}/slicer.wasm" public/wasm/slicer.wasm
          fi
          ls -lh public/wasm/

      # This is the diagnostic payload: run against the real Voron Cube v7,
      # which reliably triggers the UB (crash or hang, depending on runtime
      # memory layout — see PR discussion). Under UBSan, the exact operation
      # is caught the instant it happens with a file:line, before it can
      # cascade into either symptom. continue-on-error so the log is always
      # visible via `gh run view --log` even on the expected non-zero exit.
      - name: Reproduce UB against Voron Cube v7 (UBSan)
        continue-on-error: true
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          timeout 600 node orca-wasm/scripts/smoke-test.mjs --wasm-dir public/wasm --fixture e2e/fixtures/voron-design-cube-v7.stl 2>&1 | tee ubsan-output.log
          echo "exit code: ${PIPESTATUS[0]}"

      - name: Upload UBSan output
        uses: actions/upload-artifact@v7
        with:
          name: ubsan-diagnostic-output
          path: ubsan-output.log
          retention-days: 14
